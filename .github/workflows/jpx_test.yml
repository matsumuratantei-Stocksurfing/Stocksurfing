name: JPX earnings calendar test

# 診断専用 (手動実行のみ)。JPX Excelのパース結果をログに表示するだけで、
# メール送信・data.json変更は行わない。
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run JPX earnings diagnostics
        run: python jpx_earnings.py
