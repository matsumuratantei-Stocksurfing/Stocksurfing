name: Repair verification log (one-shot)

# verification_log.json の正解ラベル修復(2026-07-18のyfinance遅延バグ対応)。
# 手動実行(workflow_dispatch)専用。原本は verification_log_backup_prerepair.json に保存される。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Repair verification log
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python repair_verification_log.py

      - name: Commit repaired log (with retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verification_log.json
          if [ -f verification_log_backup_prerepair.json ]; then git add verification_log_backup_prerepair.json; fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Repair verification_log (relabel actuals) [repair]"
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i). Pulling with rebase..."
            git pull --rebase --autostash || true
            sleep 2
          done
          echo "Push failed after 3 attempts"
          exit 1
