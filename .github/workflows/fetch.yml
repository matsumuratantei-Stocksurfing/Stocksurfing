name: Fetch market data and notify

on:
  schedule:
    - cron: '30 22 * * *'   # 7:30 JST
    - cron: '20 0 * * 1-5'  # 9:20 JST (平日)
  workflow_dispatch:
    inputs:
      notification_type:
        description: 'Morning (7:30) or Post-open (9:20)'
        required: true
        default: 'morning'
        type: choice
        options: [morning, postopen]

permissions:
  contents: write

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Determine notification type
        id: notif
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.notification_type }}" >> $GITHUB_OUTPUT
          else
            HOUR_UTC=$(date -u +%H)
            if [ "$HOUR_UTC" = "22" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            else
              echo "type=postopen" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Fetch market data
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python fetch_data.py
      
      - name: Send notification email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          NOTIFICATION_TYPE: ${{ steps.notif.outputs.type }}
          PAGES_URL: ${{ vars.PAGES_URL }}
        run: python send_email.py
      
      - name: Commit data.json (with retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update data.json [${{ steps.notif.outputs.type }}]"
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i). Pulling with rebase..."
            git pull --rebase --autostash || true
            sleep 2
          done
          echo "Push failed after 3 attempts"
          exit 1
