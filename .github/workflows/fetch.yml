name: Fetch market data and notify

on:
  schedule:
    # cron は UTC 基準。JST月〜金朝7:30 = UTC 日〜木 22:30 なので曜日指定は 0-4
    - cron: '30 22 * * 0-4'  # 7:30 JST 平日 (月〜金)
    - cron: '20 0 * * 1-5'   # 9:20 JST 平日 (月〜金)
  workflow_dispatch:
    inputs:
      notification_type:
        description: 'Morning (7:30) or Post-open (9:20)'
        required: true
        default: 'morning'
        type: choice
        options: [morning, postopen]

permissions:
  contents: write

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # タイプ判定は「実行時刻(UTC hour)」ではなく「発火した cron 式」で決める。
      # これにより、GitHub Actions の遅延・予定外発火で実行時刻がズレても
      # 朝枠(30 22)は必ず morning、寄り後枠(20 0)は必ず postopen に固定される。
      # (旧実装は HOUR_UTC==22 判定で、遅延時に morning が postopen へ化けていた)
      - name: Determine notification type
        id: notif
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.notification_type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 22 * * 0-4" ]; then
            echo "type=morning" >> $GITHUB_OUTPUT
          else
            echo "type=postopen" >> $GITHUB_OUTPUT
          fi

      - name: Fetch market data
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python fetch_data.py

      - name: Fetch post-open prices (postopen only)
        if: steps.notif.outputs.type == 'postopen'
        run: python fetch_postopen.py
        continue-on-error: true

      - name: Send notification email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          NOTIFICATION_TYPE: ${{ steps.notif.outputs.type }}
          PAGES_URL: ${{ vars.PAGES_URL }}
        run: python send_email.py

      - name: Commit data.json / postopen.json (with retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if [ -f postopen.json ]; then git add postopen.json; fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update data.json/postopen.json [${{ steps.notif.outputs.type }}]"
          for i in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i). Pulling with rebase..."
            git pull --rebase --autostash || true
            sleep 2
          done
          echo "Push failed after 3 attempts"
          exit 1
