name: Verify predictions (nightly)

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 14:00 UTC = 23:00 JST 平日
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Verify predictions
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python verify_predictions.py
      
      - name: Commit verification_log.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verification_log.json
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update verification_log [nightly]"
            git push
          fi
