name: Unified strategy signals (v1, no ordering)

# 松村式一本化戦略v1の本日の買い候補を生成。発注なし・表示専用。
# observe(23:20)の後に走らせ、翌朝アプリ「🎯一本化」タブで見る。
on:
  schedule:
    - cron: '30 14 * * 1-5'  # 14:30 UTC = 23:30 JST 平日(日足確定後・observe直後)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  unified:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate unified signals
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python unified_signals.py

      - name: Verify (append-only forward P&L + promotion)
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python unified_verify.py

      - name: Commit signals + ledger (with retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add unified_signals.json unified_ledger.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update unified signals + ledger [unified]"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase --autostash || true
            sleep 2
          done
          echo "Push failed after 3 attempts"
          exit 1
